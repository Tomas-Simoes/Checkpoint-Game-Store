spring.application.name=checkpoint-game-store-api
server.port=8080

spring.datasource.url=jdbc:h2:file:./data/checkpoint-store-db;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

springdoc.swagger-ui.path=/swagger-ui.html

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.security.jwt.secret=${JWT_SECRET:checkpoint-store-local-development-secret-key-change-before-production-2026}
app.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
